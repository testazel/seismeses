<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Ti 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #1a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating petals */
    .petal {
      position: fixed;
      pointer-events: none;
      font-size: 18px;
      opacity: 0;
      animation: fall linear infinite;
      z-index: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Soft radial glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 40%, #3d0b1e 0%, #1a0a0f 100%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, #2a0d18 0%, #1f0912 100%);
      border-radius: 24px;
      border: 1px solid rgba(220, 80, 110, 0.25);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      box-shadow:
        0 0 0 1px rgba(220,80,110,0.1),
        0 8px 48px rgba(180,30,60,0.35),
        0 2px 12px rgba(0,0,0,0.5);
    }

    /* Decorative top line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e0547a, #ff8fab, #e0547a, transparent);
      border-radius: 2px;
    }

    .heart-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle, #5c1530, #3a0d1e);
      border: 1px solid rgba(220,80,110,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 24px rgba(220,80,110,0.4);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 24px rgba(220,80,110,0.4); }
      50%       { transform: scale(1.07); box-shadow: 0 0 36px rgba(220,80,110,0.65); }
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(220,80,110,0.5), transparent);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: #f5c9d5;
      text-align: center;
      letter-spacing: 0.01em;
      line-height: 1.3;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(200,140,160,0.7);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: -0.5rem;
    }

    .pin-row {
      display: flex;
      gap: 8px;
    }

    .pin-box {
      width: 38px;
      height: 52px;
      border: 1.5px solid rgba(180,60,90,0.35);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      color: #f5c9d5;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      font-family: 'Courier New', monospace;
      caret-color: #e0547a;
    }
    .pin-box:focus {
      border-color: #e0547a;
      background: rgba(220,80,110,0.08);
      box-shadow: 0 0 0 3px rgba(220,80,110,0.15);
    }
    .pin-box.filled {
      border-color: rgba(220,80,110,0.7);
      background: rgba(220,80,110,0.1);
      color: #ffb3c6;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #c0395f, #e0547a);
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 18px rgba(200,50,80,0.4);
    }
    .btn:hover  { opacity: 0.9; box-shadow: 0 6px 24px rgba(200,50,80,0.55); }
    .btn:active { transform: scale(0.98); }

    .msg {
      font-size: 13px;
      font-weight: 400;
      min-height: 20px;
      text-align: center;
      letter-spacing: 0.03em;
    }
    .msg.err { color: #f08090; }
    .msg.ok  { color: #90e0b0; }

    /* ---- Unlocked ---- */
    #content {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      text-align: center;
      width: 100%;
    }
    #content.show { display: flex; }

    .unlock-icon {
      font-size: 42px;
      animation: pop .4s cubic-bezier(.17,.67,.4,1.4);
    }
    @keyframes pop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .content-box {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      border: 1px solid rgba(220,80,110,0.18);
      padding: 1.25rem 1.5rem;
      width: 100%;
      font-size: 15px;
      color: #d4a0b0;
      line-height: 1.75;
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }
    .content-box strong {
      display: block;
      font-style: normal;
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(200,140,160,0.5);
      margin-bottom: 0.5rem;
    }

    .hearts-row {
      font-size: 22px;
      letter-spacing: 6px;
      animation: fadeIn .8s ease .3s both;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; } }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(180,60,90,0.3);
      color: rgba(200,140,160,0.6);
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, color .15s;
      letter-spacing: 0.04em;
    }
    .btn-ghost:hover { background: rgba(220,80,110,0.06); color: #d4a0b0; }
  </style>
</head>
<body>

<!-- Floating petals injected by JS -->

<div class="card">

  <!-- LOCKED -->
  <div id="gate" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:1.25rem;">
    <div class="heart-wrap">🌹</div>
    <div class="divider"></div>
    <h1>¡Página Protegida!</h1>
    <p class="subtitle">Ingresa el código de 9 dígitos</p>

    <div class="pin-row" id="pinRow">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="0">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="1">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="2">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="3">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="4">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="5">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="6">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="7">
      <input class="pin-box" maxlength="1" inputmode="numeric" data-i="8">
    </div>

    <button class="btn" id="unlockBtn">✦ Abrir ✦</button>
    <p class="msg" id="msg"></p>
  </div>

  <!-- UNLOCKED -->
  <div id="content">
    <div class="unlock-icon">💖</div>
    <div class="divider"></div>
    <h1>¡Felicidades!</h1>
    <div class="hearts-row">🌹 💕 🌹</div>
    <div class="content-box">
      <strong>Para ti</strong>
      Ahora puedes ver el contenido protegido.
    </div>
    <div class="content-box">
      Te amo tanto que si fuera a la luna le pondría tu nombre al
      descubrimiento de un nuevo cráter&nbsp;:)
    </div>
    <button class="btn-ghost" id="lockBtn">🔒 Cerrar</button>
  </div>

</div>

<script>
  // ── Floating petals ──
  const EMOJIS = ["🌸","🌹","💕","✨","🥀","💫","❤️"];
  for (let n = 0; n < 18; n++) {
    const el = document.createElement("div");
    el.className = "petal";
    el.textContent = EMOJIS[n % EMOJIS.length];
    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (7 + Math.random() * 10) + "s";
    el.style.animationDelay    = (Math.random() * 12) + "s";
    el.style.fontSize = (13 + Math.random() * 14) + "px";
    el.style.opacity = "0";
    document.body.appendChild(el);
  }

  // ── Password logic ──
  const PASSWORD = "939415983";

  const boxes   = [...document.querySelectorAll(".pin-box")];
  const msg     = document.getElementById("msg");
  const gate    = document.getElementById("gate");
  const content = document.getElementById("content");

  boxes.forEach((box, i) => {
    box.addEventListener("input", e => {
      box.value = e.target.value.replace(/\D/g,"").slice(-1);
      box.classList.toggle("filled", !!box.value);
      if (box.value && i < 8) boxes[i+1].focus();
    });
    box.addEventListener("keydown", e => {
      if (e.key === "Backspace" && !box.value && i > 0) {
        boxes[i-1].value = "";
        boxes[i-1].classList.remove("filled");
        boxes[i-1].focus();
      }
      if (e.key === "Enter") unlock();
    });
    box.addEventListener("paste", e => {
      e.preventDefault();
      const txt = (e.clipboardData||window.clipboardData).getData("text").replace(/\D/g,"");
      [...txt].slice(0,9).forEach((ch,j) => {
        if (boxes[i+j]) { boxes[i+j].value = ch; boxes[i+j].classList.add("filled"); }
      });
      boxes[Math.min(i+txt.length,8)].focus();
    });
  });

  function getPin() { return boxes.map(b=>b.value).join(""); }

  function unlock() {
    const pin = getPin();
    if (pin.length < 9) { showMsg("Faltan dígitos 💔", "err"); return; }
    if (pin === PASSWORD) {
      gate.style.display = "none";
      content.classList.add("show");
      msg.textContent = "";
    } else {
      showMsg("Código incorrecto — intenta de nuevo 💔", "err");
      boxes.forEach(b => { b.value = ""; b.classList.remove("filled"); });
      boxes[0].focus();
    }
  }

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = "msg " + type;
  }

  document.getElementById("unlockBtn").addEventListener("click", unlock);
  document.getElementById("lockBtn").addEventListener("click", () => {
    content.classList.remove("show");
    gate.style.display = "flex";
    boxes.forEach(b => { b.value = ""; b.classList.remove("filled"); });
    boxes[0].focus();
  });

  boxes[0].focus();
</script>
</body>
</html>
